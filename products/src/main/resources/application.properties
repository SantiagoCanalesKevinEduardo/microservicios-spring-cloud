spring.application.name=products
server.port=8080


spring.cloud.stream.bindings.commands-out-0.destination=products.commands
spring.cloud.stream.bindings.commands-out-0.content-type=application/json


spring.cloud.function.definition=handlerReplies
spring.cloud.stream.bindings.handlerReplies-in-0.destination=products.replies
spring.cloud.stream.bindings.handlerReplies-in-0.content-type=application/json
spring.cloud.stream.bindings.handlerReplies-in-0.group=products-api
spring.cloud.stream.kafka.bindings.handlerReplies-in-0.consumer.start-offset=latest



spring.cloud.stream.bindings.clients-out-0.destination=clients.commands
spring.cloud.stream.bindings.clients-out-0.content-type=application/json



spring.cloud.stream.kafka.binder.brokers=localhost:9092