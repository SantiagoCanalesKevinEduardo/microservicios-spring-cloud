spring:
  application:
    name: productcommand
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/seguridad_db?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:prueba123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  cloud:
    function:
      definition: handlerCommands;handleClients
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
        bindings:
          handlerCommands-in-0:
            consumer:
              start-offset: latest
      bindings:
        handlerCommands-in-0:
          destination: products.commands
          content-type: application/json
          group: products-command
        handlerCommands-out-0:
          destination: products.replies
          content-type: application/json
        handleClients-in-0:
          destination: clients.commands
          content-type: application/json
          group: clients-command

server:
  port: 8081
